<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Магазин 3D-моделей</h1>
        <div class="cart-icon">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <section class="filters">
            <h2>Фильтры</h2>
            <!-- Здесь можно добавить фильтры по категориям, цене и т.д. -->
        </section>

        <section class="products" id="products-container">
            <!-- Товары будут загружаться сюда через JavaScript -->
        </section>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Корзина</h2>
            <ul id="cart-items"></ul>
            <p>Итого: <span id="cart-total">0</span> руб.</p>
            <button id="checkout-btn">Оформить заказ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
